name: my-ebookstore

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    env_file:
      - backend/.env
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test:
        - CMD-SHELL
        - /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${MSSQL_SA_PASSWORD}" -C -Q "SELECT 1" -b -o /dev/null
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 45s
    restart: unless-stopped

  db-init:
    build:
      context: .
    env_file:
      - backend/.env
    command: ["python", "scripts/init_db.py"]
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
    env_file:
      - backend/.env
    command:
      - uvicorn
      - backend.app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --proxy-headers
      - --forwarded-allow-ips=*
    ports:
      - "127.0.0.1:8003:8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3)"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      db-init:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  sqlserver-data:
