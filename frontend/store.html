<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>书店主页 - My-eBookStore</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="brand"><span class="brand-mark">书</span>My-eBookStore</a>
      <nav class="main-nav">
        <a href="index.html">首页</a>
        <a href="search.html">全部图书</a>
        <a href="promotions.html">促销活动</a>
      </nav>
      <div class="header-search">
        <form action="search.html" method="get">
          <input type="search" name="keyword" class="form-control" placeholder="请输入搜索内容" />
          <input type="hidden" name="searchType" value="title" />
          <button type="submit" class="btn btn-primary">搜索</button>
        </form>
        <div class="search-mode-bar">
          <button type="button" data-mode="title" class="active">书名</button>
          <button type="button" data-mode="author">作者</button>
          <button type="button" data-mode="isbn">ISBN</button>
        </div>
      </div>
      <div class="header-actions">
        <a href="cart.html" class="cart-link">🛒<span class="cart-badge hidden" id="cartBadge">0</span></a>
        <div id="authArea"></div>
      </div>
    </div>
  </header>

  <main class="container page-section">
    <div class="breadcrumb">
      <a href="index.html">首页</a><span class="sep">/</span>
      <span class="current" id="breadcrumbStoreName">书店主页</span>
    </div>

    <!-- 店铺信息头部 -->
    <section class="card store-header">
      <div class="store-header-inner">
        <div class="store-avatar">🏬</div>
        <div class="store-header-info">
          <h1 id="storeName">加载中...</h1>
          <p class="text-muted" id="storeDescription">-</p>
          <div class="store-meta">
            <span>入驻时间：<b id="storeCreatedTime">-</b></span>
            <span>在架图书：<b id="storeBookCount">-</b> 本</span>
            <span>累计销量：<b id="storeSalesCount">-</b> 件</span>
          </div>
        </div>
      </div>
    </section>

    <!-- 该书店全部在架图书 -->
    <div class="search-toolbar">
      <span id="storeResultCount">共 0 本图书</span>
      <div class="sort-tabs">
        <button type="button" class="active" data-sort="default">默认排序</button>
        <button type="button" data-sort="sales">销量优先</button>
        <button type="button" data-sort="price_asc">价格从低到高</button>
        <button type="button" data-sort="price_desc">价格从高到低</button>
      </div>
    </div>

    <div class="book-grid" id="storeBookGrid">
      <div class="skeleton" style="height:280px"></div>
      <div class="skeleton" style="height:280px"></div>
      <div class="skeleton" style="height:280px"></div>
    </div>

    <div class="pagination" id="storePagination"></div>
  </main>

  <footer class="site-footer">
    <div class="container footer-bottom">© 2026 My-eBookStore 网上书店系统 · 课程设计项目 9 组</div>
  </footer>
  <script src="js/mock-data.js?v=20260710-7"></script>
  <script src="js/api.js?v=20260710-7"></script>
  <script src="js/common.js?v=20260710-7"></script>
  <script src="js/store.js?v=20260710-7"></script>
</body>
</html>
