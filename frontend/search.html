<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>图书搜索 - My-eBookStore</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="brand"><span class="brand-mark">书</span>My-eBookStore</a>
      <nav class="main-nav">
        <a href="index.html">首页</a>
        <a href="search.html" class="active">全部图书</a>
        <a href="promotions.html">促销活动</a>
      </nav>
      <div class="header-search">
        <form id="searchForm">
          <input type="search" id="searchKeywordInput" class="form-control" placeholder="搜索书名 / 作者 / ISBN" />
          <button type="submit" class="btn btn-primary">搜索</button>
        </form>
      </div>
      <div class="header-actions">
        <a href="cart.html" class="cart-link">🛒<span class="cart-badge" id="cartBadge" hidden>0</span></a>
        <div id="authArea"></div>
      </div>
    </div>
  </header>

  <main class="container page-section">
    <div class="breadcrumb">
      <a href="index.html">首页</a><span class="sep">/</span><span class="current" id="searchTitle">全部图书</span>
    </div>

    <div class="search-layout">
      <!-- 筛选面板 -->
      <aside class="filter-panel card">
        <div class="card-body">
          <div class="filter-group">
            <h4>图书分类</h4>
            <div id="categoryFilterList">
              <!-- 由 search.js 通过 BookAPI.listCategories() 动态填充 -->
            </div>
          </div>
          <div class="filter-group">
            <h4>库存状态</h4>
            <label class="filter-option">
              <input type="checkbox" id="inStockOnly" />
              只看有货
            </label>
          </div>
        </div>
      </aside>

      <!-- 结果列表 -->
      <section>
        <div class="search-toolbar">
          <span id="resultCount">共找到 0 件相关商品</span>
          <div class="sort-tabs">
            <button type="button" class="active" data-sort="default">综合排序</button>
            <button type="button" data-sort="sales">销量优先</button>
            <button type="button" data-sort="price_asc">价格从低到高</button>
            <button type="button" data-sort="price_desc">价格从高到低</button>
          </div>
        </div>

        <div class="book-grid" id="searchResultGrid">
          <div class="skeleton" style="height:280px"></div>
          <div class="skeleton" style="height:280px"></div>
          <div class="skeleton" style="height:280px"></div>
        </div>

        <div class="pagination" id="pagination"></div>
      </section>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-bottom">© 2026 My-eBookStore 网上书店系统 · 课程设计项目 9 组</div>
  </footer>

  <script src="js/mock-data.js"></script>
  <script src="js/api.js"></script>
  <script src="js/common.js"></script>
  <script src="js/search.js"></script>
</body>
</html>
