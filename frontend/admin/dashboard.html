<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>数据总览 - My-eBookStore 后台管理</title>
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/admin.css" />
</head>
<body class="admin-body">

  <div class="admin-shell">
    <aside class="admin-sidebar" id="adminSidebar">
      <div class="admin-brand"><span class="brand-mark">书</span>后台管理</div>
      <div class="admin-role-tag" id="adminRoleTag">当前角色<span class="role-name">-</span></div>
      <nav class="admin-menu">
        <div class="menu-group-title">概览</div>
        <a href="dashboard.html" data-nav="dashboard"><span class="menu-icon">📊</span>数据总览</a>
        <div class="menu-group-title">经营管理</div>
        <a href="store-profile.html" data-nav="store-profile" data-role-only="seller"><span class="menu-icon">🏪</span>店铺信息设置</a>
        <a href="books.html" data-nav="books"><span class="menu-icon">📚</span>图书管理</a>
        <a href="orders.html" data-nav="orders"><span class="menu-icon">🧾</span>订单管理</a>
        <a href="users.html" data-nav="users"><span class="menu-icon">👥</span>用户管理</a>
        <a href="stores.html" data-nav="stores" data-role-only="platform_admin"><span class="menu-icon">🏬</span>店铺管理</a>
        <a href="promotions.html" data-nav="promotions"><span class="menu-icon">🎁</span>促销活动管理</a>
        <a href="statistics.html" data-nav="statistics"><span class="menu-icon">📈</span>数据统计与分析</a>
      </nav>
      <div class="admin-sidebar-footer">
        <button type="button" id="adminLogoutBtn">⏻ 退出登录</button>
      </div>
    </aside>

    <div class="admin-main">
      <header class="admin-topbar">
        <span class="page-title">数据总览</span>
        <div class="admin-topbar-actions">
          <a href="../index.html" class="btn-text" target="_blank">查看前台 →</a>
          <span id="adminTopUser">-</span>
        </div>
      </header>

      <div class="admin-content">
        <div class="kpi-grid">
          <div class="card kpi-card">
            <div class="kpi-top"><div class="kpi-icon">💰</div></div>
            <div class="kpi-value" id="kpiTodaySales">¥0.00</div>
            <div class="kpi-label">近7日销售额</div>
          </div>
          <div class="card kpi-card">
            <div class="kpi-top"><div class="kpi-icon">🧾</div></div>
            <div class="kpi-value" id="kpiTodayOrders">0</div>
            <div class="kpi-label">近7日订单数</div>
          </div>
          <div class="card kpi-card">
            <div class="kpi-top"><div class="kpi-icon">👥</div></div>
            <div class="kpi-value" id="kpiTotalUsers">0</div>
            <div class="kpi-label">关联用户数</div>
          </div>
          <div class="card kpi-card" data-role-only="platform_admin">
            <div class="kpi-top"><div class="kpi-icon">🏬</div></div>
            <div class="kpi-value" id="kpiTotalStores">0</div>
            <div class="kpi-label">入驻店铺数</div>
          </div>
        </div>

        <div class="panel-grid">
          <div class="card">
            <div class="panel-header"><h3>近 7 日销售趋势</h3></div>
            <div class="chart-box">
              <div class="bar-chart" id="salesBarChart"></div>
            </div>
          </div>
          <div class="card">
            <div class="panel-header"><h3>热销图书 TOP 5</h3></div>
            <div class="chart-box">
              <div class="rank-list" id="hotBookRank"></div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="panel-header"><h3>最新订单</h3><a class="btn-text" href="orders.html">查看全部 →</a></div>
          <div class="data-table-wrap">
            <table class="data-table">
              <thead><tr><th>订单号</th><th>下单时间</th><th>实付金额</th><th>状态</th></tr></thead>
              <tbody id="recentOrderTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="../js/mock-data.js?v=20260710-8"></script>
  <script src="../js/api.js?v=20260710-8"></script>
  <script src="../js/common.js?v=20260710-8"></script>
  <script src="../js/admin/common.js?v=20260710-8"></script>
  <script src="../js/admin/dashboard.js?v=20260710-8"></script>
</body>
</html>
