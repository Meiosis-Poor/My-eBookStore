<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>订单管理 - My-eBookStore 后台管理</title>
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/admin.css" />
</head>
<body class="admin-body">

  <div class="admin-shell">
    <aside class="admin-sidebar" id="adminSidebar">
      <div class="admin-brand"><span class="brand-mark">书</span>后台管理</div>
      <div class="admin-role-tag" id="adminRoleTag">当前角色<span class="role-name">-</span></div>
      <nav class="admin-menu">
        <div class="menu-group-title">概览</div>
        <a href="dashboard.html" data-nav="dashboard"><span class="menu-icon">📊</span>数据总览</a>
        <div class="menu-group-title">经营管理</div>
        <a href="store-profile.html" data-nav="store-profile" data-role-only="seller"><span class="menu-icon">🏪</span>店铺信息设置</a>
        <a href="books.html" data-nav="books"><span class="menu-icon">📚</span>图书管理</a>
        <a href="orders.html" data-nav="orders"><span class="menu-icon">🧾</span>订单管理</a>
        <a href="users.html" data-nav="users"><span class="menu-icon">👥</span>用户管理</a>
        <a href="stores.html" data-nav="stores" data-role-only="platform_admin"><span class="menu-icon">🏬</span>店铺管理</a>
        <a href="promotions.html" data-nav="promotions"><span class="menu-icon">🎁</span>促销活动管理</a>
        <a href="statistics.html" data-nav="statistics"><span class="menu-icon">📈</span>数据统计与分析</a>
      </nav>
      <div class="admin-sidebar-footer">
        <button type="button" id="adminLogoutBtn">⏻ 退出登录</button>
      </div>
    </aside>

    <div class="admin-main">
      <header class="admin-topbar">
        <span class="page-title">订单管理</span>
        <div class="admin-topbar-actions">
          <a href="../index.html" class="btn-text" target="_blank">查看前台 →</a>
          <span id="adminTopUser">-</span>
        </div>
      </header>

      <div class="admin-content">
        <div class="card">
          <div class="card-body">
            <div class="admin-tabs">
              <button type="button" class="active" data-status="all">全部</button>
              <button type="button" data-status="pending_payment">待支付</button>
              <button type="button" data-status="shipped">待收货</button>
              <button type="button" data-status="completed">已完成</button>
              <button type="button" data-status="refunding">退款中</button>
            </div>

            <div class="toolbar">
              <div class="toolbar-filters">
                <input type="text" id="orderSearchInput" class="form-control" placeholder="搜索订单号" style="min-width:260px" />
              </div>
            </div>

            <div class="data-table-wrap">
              <table class="data-table">
                <thead><tr><th>订单号</th><th>下单时间</th><th>商品</th><th>实付金额</th><th>状态</th><th>操作</th></tr></thead>
                <tbody id="adminOrdersTableBody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-mask" id="orderDetailModal">
    <div class="modal">
      <div class="modal-header">
        <h3>订单详情</h3>
        <button type="button" class="modal-close" onclick="closeModal('orderDetailModal')">×</button>
      </div>
      <div class="modal-body" id="orderDetailBody"></div>
    </div>
  </div>

  <script src="../js/mock-data.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/common.js"></script>
  <script src="../js/admin/common.js"></script>
  <script src="../js/admin/orders.js"></script>
</body>
</html>
