<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>确认订单 - My-eBookStore</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="brand"><span class="brand-mark">书</span>My-eBookStore</a>
      <div class="header-actions" style="margin-left:auto">
        <div id="authArea"></div>
      </div>
    </div>
  </header>

  <main class="container page-section">
    <div class="steps-bar">
      <div class="step-item done"><span class="step-num">1</span>购物车</div>
      <div class="step-item active"><span class="step-num">2</span>确认订单</div>
      <div class="step-item"><span class="step-num">3</span>支付</div>
      <div class="step-item"><span class="step-num">4</span>完成</div>
    </div>

    <div class="checkout-layout">
      <div>
        <div class="card mb-4">
          <div class="card-body">
            <h3 class="mb-4" style="font-size:15px">收货信息</h3>
            <div class="address-card" id="checkoutAddressCard">
              <div class="text-muted">加载中...</div>
            </div>
            <p class="form-hint">* 可选择已保存的收货地址，或新增一个仅用于本次订单的收货人 / 手机号 / 地址。</p>
          </div>
        </div>

        <div class="card">
          <div class="card-body">
            <h3 class="mb-4" style="font-size:15px">商品清单</h3>
            <div id="checkoutItemList"></div>
          </div>
        </div>
      </div>

      <div class="card" style="position:sticky; top:calc(var(--header-height) + 16px)">
        <div class="card-body">
          <h3 class="mb-4" style="font-size:15px">优惠与结算</h3>
          <div class="coupon-select" id="couponSelect">
            <span id="couponLabel">选择可用代金券</span>
            <span>›</span>
          </div>
          <div class="summary-line"><span>商品总额</span><span id="summarySubtotal">¥0.00</span></div>
          <div class="summary-line"><span>优惠金额</span><span id="summaryDiscount">- ¥0.00</span></div>
          <div class="summary-line total"><span>应付总额</span><span class="amount" id="summaryTotal">¥0.00</span></div>
          <button type="button" class="btn btn-primary btn-block mt-4" id="submitOrderBtn">提交订单</button>
        </div>
      </div>
    </div>
  </main>

  <!-- 代金券选择模态框 -->
  <div class="modal-mask" id="couponModal">
    <div class="modal">
      <div class="modal-header">
        <h3>选择代金券</h3>
        <button type="button" class="modal-close" onclick="closeModal('couponModal')">×</button>
      </div>
      <div class="modal-body" id="couponList"></div>
      <div class="modal-footer">
        <button type="button" class="btn btn-primary" id="confirmCouponBtn">确定</button>
      </div>
    </div>
  </div>

  <!-- 收货地址选择 / 新增 / 编辑模态框 -->
  <div class="modal-mask" id="addressModal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="addressModalTitle">选择收货地址</h3>
        <button type="button" class="modal-close" onclick="closeModal('addressModal')">×</button>
      </div>
      <div class="modal-body">
        <div id="addressListView">
          <div id="addressList"></div>
          <button type="button" class="btn-text mt-3" id="showAddAddressBtn">+ 新增收货地址</button>
        </div>
        <form id="addressForm" class="hidden">
          <input type="hidden" name="addressId" />
          <div class="form-group">
            <label class="form-label">收货人<span class="required">*</span></label>
            <input type="text" name="recipientName" class="form-control" required />
          </div>
          <div class="form-group">
            <label class="form-label">手机号<span class="required">*</span></label>
            <input type="tel" name="phone" class="form-control" required pattern="^1[3-9]\d{9}$" placeholder="11 位手机号" />
          </div>
          <div class="form-group">
            <label class="form-label">收货地址<span class="required">*</span></label>
            <textarea name="addressDetail" class="form-control" required placeholder="省市区及详细地址"></textarea>
          </div>
          <label class="filter-option"><input type="checkbox" name="isDefault" /> 设为默认地址</label>
        </form>
      </div>
      <div class="modal-footer" id="addressListFooter">
        <button type="button" class="btn btn-primary" id="confirmAddressBtn">确定</button>
      </div>
      <div class="modal-footer hidden" id="addressFormFooter">
        <button type="button" class="btn btn-primary" id="saveAddressBtn">保存</button>
      </div>
    </div>
  </div>
  <script src="js/mock-data.js?v=20260710-5"></script>
  <script src="js/api.js?v=20260710-5"></script>
  <script src="js/common.js?v=20260710-5"></script>
  <script src="js/checkout.js?v=20260710-5"></script>
</body>
</html>
