<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 - My-eBookStore</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="brand"><span class="brand-mark">书</span>My-eBookStore</a>
      <nav class="main-nav">
        <a href="index.html">首页</a>
        <a href="search.html">全部图书</a>
        <a href="promotions.html">促销活动</a>
      </nav>
      <div class="header-actions" style="margin-left:auto">
        <a href="cart.html" class="cart-link">🛒<span class="cart-badge hidden" id="cartBadge">0</span></a>
        <div id="authArea"></div>
      </div>
    </div>
  </header>

  <main class="auth-page">
    <div class="card auth-card">
      <h1 class="heading-serif">欢迎回来</h1>
      <p class="auth-sub">登录 My-eBookStore，继续你的阅读之旅</p>

      <!-- 账号类型切换：普通用户 / 书店管理员 / 后台管理员 -->
      <div class="role-switch" id="loginRoleSwitch">
        <button type="button" data-role="customer" class="active">普通用户</button>
        <button type="button" data-role="seller">书店管理员</button>
        <button type="button" data-role="platform_admin">后台管理员</button>
      </div>

      <form id="loginForm" novalidate>
        <div class="form-group" id="loginUserNameGroup">
          <label class="form-label">用户名<span class="required">*</span></label>
          <input type="text" name="userName" class="form-control" placeholder="请输入用户名" autocomplete="username" />
          <div class="form-error"></div>
        </div>
        <div class="form-group" id="loginPasswordGroup">
          <label class="form-label">密码<span class="required">*</span></label>
          <input type="password" name="password" class="form-control" placeholder="请输入密码" autocomplete="current-password" />
          <div class="form-error"></div>
        </div>
        <div class="flex justify-between items-center mb-4" style="font-size:13px">
          <label class="checkbox-line"><input type="checkbox" name="remember" /> 记住我</label>
          <a href="#" class="text-muted">忘记密码？</a>
        </div>
        <button type="submit" class="btn btn-primary btn-block">登录</button>
      </form>

      <p class="auth-footer-link">还没有账号？<a href="register.html">立即注册</a></p>
    </div>
  </main>
  <script src="js/api.js?v=20260710-4"></script>
  <script src="js/common.js?v=20260710-4"></script>
  <script src="js/auth.js?v=20260710-4"></script>
</body>
</html>
