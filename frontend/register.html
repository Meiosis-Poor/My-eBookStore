<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>注册 - My-eBookStore</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="brand"><span class="brand-mark">书</span>My-eBookStore</a>
      <nav class="main-nav">
        <a href="index.html">首页</a>
        <a href="search.html">全部图书</a>
        <a href="promotions.html">促销活动</a>
      </nav>
      <div class="header-actions" style="margin-left:auto">
        <a href="cart.html" class="cart-link">🛒<span class="cart-badge hidden" id="cartBadge">0</span></a>
        <div id="authArea"></div>
      </div>
    </div>
  </header>

  <main class="auth-page">
    <div class="card auth-card">
      <h1 class="heading-serif">创建账号</h1>
      <p class="auth-sub">加入 My-eBookStore，开启便捷购书体验</p>

      <!-- 账号类型：普通用户 / 书店管理员（后台管理员账号由平台统一开通，不支持自助注册） -->
      <div class="role-switch" id="registerRoleSwitch">
        <button type="button" data-role="customer" class="active" style="grid-column: span 1.5">普通用户</button>
        <button type="button" data-role="seller" style="grid-column: span 1.5">书店管理员（卖家入驻）</button>
      </div>

      <form id="registerForm" novalidate>
        <div class="form-group" id="regUserNameGroup">
          <label class="form-label">用户名<span class="required">*</span></label>
          <input type="text" name="userName" class="form-control" placeholder="3-20 位字母数字组合" />
          <div class="form-hint">用于登录，注册后不可修改</div>
          <div class="form-error"></div>
        </div>

        <div class="form-group" id="storeNameGroup">
          <label class="form-label">店铺名称<span class="required">*</span></label>
          <input type="text" name="storeName" class="form-control" placeholder="请输入您的店铺名称" />
          <div class="form-error"></div>
        </div>

        <div class="form-group">
          <label class="form-label">昵称</label>
          <input type="text" name="nickname" class="form-control" placeholder="选填，默认与用户名相同" />
        </div>

        <div class="form-row">
          <div class="form-group" id="regPasswordGroup">
            <label class="form-label">密码<span class="required">*</span></label>
            <input type="password" name="password" class="form-control" placeholder="6-20 位，含字母和数字" />
            <div class="form-error"></div>
          </div>
          <div class="form-group" id="regConfirmPasswordGroup">
            <label class="form-label">确认密码<span class="required">*</span></label>
            <input type="password" name="confirmPassword" class="form-control" placeholder="再次输入密码" />
            <div class="form-error"></div>
          </div>
        </div>

        <div class="checkbox-line mb-4">
          <input type="checkbox" id="agreeTerms" required />
          <label for="agreeTerms">我已阅读并同意《用户服务协议》与《隐私政策》</label>
        </div>

        <button type="submit" class="btn btn-primary btn-block">注册</button>
      </form>

      <p class="auth-footer-link">已有账号？<a href="login.html">立即登录</a></p>
    </div>
  </main>
  <script src="js/api.js?v=20260710-4"></script>
  <script src="js/common.js?v=20260710-4"></script>
  <script src="js/auth.js?v=20260710-4"></script>
</body>
</html>
