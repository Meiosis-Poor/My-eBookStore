<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>订单详情 - My-eBookStore</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="brand"><span class="brand-mark">书</span>My-eBookStore</a>
      <div class="header-actions" style="margin-left:auto">
        <a href="cart.html" class="cart-link">🛒<span class="cart-badge hidden" id="cartBadge">0</span></a>
        <div id="authArea"></div>
      </div>
    </div>
  </header>

  <main class="container page-section" style="max-width:760px">
    <div class="breadcrumb">
      <a href="index.html">首页</a><span class="sep">/</span>
      <a href="orders.html">我的订单</a><span class="sep">/</span>
      <span class="current">订单详情</span>
    </div>

    <div class="card mb-4">
      <div class="card-body flex justify-between items-center">
        <div>
          <div style="font-weight:700">订单号：<span id="orderNo">-</span></div>
          <div class="text-muted mt-2" style="font-size:13px">下单时间：<span id="orderTime">-</span></div>
        </div>
        <span class="badge badge-info" id="orderStatusBadge">-</span>
      </div>
    </div>

    <div class="card mb-4">
      <div class="card-body">
        <h3 class="mb-4" style="font-size:15px">收货信息</h3>
        <div>
          <div style="font-weight:600"><span id="orderReceiverName">-</span> &nbsp;<span id="orderReceiverPhone"></span></div>
          <div class="text-muted mt-2" style="font-size:13px" id="orderReceiverAddress">-</div>
        </div>
      </div>
    </div>

    <div class="card mb-4">
      <div class="card-body">
        <h3 class="mb-4" style="font-size:15px">商品明细</h3>
        <div id="orderItemList"></div>
      </div>
    </div>

    <div class="card mb-4">
      <div class="card-body">
        <div class="summary-line"><span>商品总额</span><span id="orderTotal">¥0.00</span></div>
        <div class="summary-line"><span>优惠金额</span><span id="orderDiscount">- ¥0.00</span></div>
        <div class="summary-line total"><span>实付金额</span><span class="amount" id="orderActual">¥0.00</span></div>
      </div>
    </div>

    <div class="flex gap-3" id="orderActionBar"></div>
  </main>
  <script src="js/api.js?v=20260710-4"></script>
  <script src="js/common.js?v=20260710-4"></script>
  <script src="js/order-detail.js?v=20260710-4"></script>
</body>
</html>
