[pytest]
testpaths = tests
markers =
    integration: requires SQL Server with the schema and database/99_test_seed.sql loaded
    performance: checks course-acceptance response-time thresholds
    blackbox_smoke: fast equivalence and contract tests for daily development
    blackbox_full: extended generated black-box tests for course demonstration
    schemathesis: OpenAPI contract tests generated by Schemathesis
    whitebox: implementation-aware logic and branch coverage tests
    whitebox_unit: isolated pure-logic white-box tests
    whitebox_dao: mocked DAO branch and exception tests
